name: gateway-budget-config
type: gateway-budget-config
rules:
  - id: enterprise-per-tenant-daily
    unit: cost_per_day
    when:
      metadata:
        tier: enterprise
    alerts:
      thresholds:
        - 80
        - 95
        - 100
      notification_target:
        - type: email
          to_emails:
            - oncall@yourcompany.com
          notification_channel: llm-alerts-email
    limit_to: 500
    audit_mode: false
    budget_applies_per:
      - metadata.tenant_id
  - id: growth-per-tenant-daily
    unit: cost_per_day
    when:
      metadata:
        tier: growth
    alerts:
      thresholds:
        - 80
        - 95
        - 100
      notification_target:
        - type: email
          to_emails:
            - oncall@yourcompany.com
          notification_channel: llm-alerts-email
    limit_to: 100
    audit_mode: false
    budget_applies_per:
      - metadata.tenant_id
  - id: starter-per-tenant-daily
    unit: cost_per_day
    when:
      metadata:
        tier: starter
    alerts:
      thresholds:
        - 80
        - 100
      notification_target:
        - type: email
          to_emails:
            - oncall@yourcompany.com
          notification_channel: llm-alerts-email
    limit_to: 20
    audit_mode: false
    budget_applies_per:
      - metadata.tenant_id
  - id: fallback-untagged-daily
    unit: cost_per_day
    when: {}
    limit_to: 10
    audit_mode: false
    budget_applies_per:
      - metadata.tenant_id
